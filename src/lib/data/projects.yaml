- title: "Simple Shooter"
  url: "https://github.com/nasyrovt/UnrealEngine_SimpleShooter"
  preview: "/projects/simple-shooter/"
  description: "Third person shooter made in Unreal Engine using AAA assets from Paragon game. Full TPS controls with animations and shooting using raycast. AI bots have shooting and navigation movement systems."
  image: "/images/projects/simple-shooter.png"
  genre: "Third Person Shooter"
  stack: "Unreal Engine 4.22 / C++"
  targetAudience: "15+ aged"
  controls: "Keyboard + Mouse / Gamepad"
  platform: "PC / Console"
  shapes:
    - type: "donut"
      color: "blue"
      size: ["120px", "220px"]
      xOffset: ["-70px"]
      yOffset: ["100px", "180px"]
      opacity: 1
    - type: "circle"
      color: "purple"
      size: ["50px", "100px"]
      xOffset: ["140px"]
      yOffset: ["-40px", "-70px"]
      opacity: 1

